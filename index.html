<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Нихауу - кристаллы и подарки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
            position: fixed;
            width: 100%;
        }

        /* ТЕМЫ */
        body.theme-light {
            --bg: #f0f2f5;
            --bg-secondary: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666;
            --border: #e9edf0;
            --message-out: #dcf8c6;
            --message-in: #ffffff;
            --accent: #667eea;
        }

        body.theme-dark {
            --bg: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text: #ffffff;
            --text-secondary: #aaa;
            --border: #404040;
            --message-out: #2b5b4c;
            --message-in: #2d2d2d;
            --accent: #667eea;
        }

        body.theme-ocean {
            --bg: #1a3b5c;
            --bg-secondary: #2c4c6b;
            --text: #ffffff;
            --text-secondary: #b8d8f0;
            --border: #4a6a88;
            --message-out: #ff6b6b;
            --message-in: #4ecdc4;
            --accent: #ffd93d;
        }

        body.theme-desert {
            --bg: #e6d5b8;
            --bg-secondary: #f4e4c1;
            --text: #5a3e2b;
            --text-secondary: #8b6e4b;
            --border: #d4b68a;
            --message-out: #e6b89c;
            --message-in: #faf0e6;
            --accent: #b45f3b;
        }

        body.theme-mint {
            --bg: #d4edda;
            --bg-secondary: #e8f5e9;
            --text: #1e3c2c;
            --text-secondary: #2d4a3a;
            --border: #b8dfc6;
            --message-out: #98c1a9;
            --message-in: #ffffff;
            --accent: #4caf7f;
        }

        body.theme-custom {
            --bg: var(--custom-bg, #f0f2f5);
            --bg-secondary: var(--custom-bg-secondary, #ffffff);
            --text: var(--custom-text, #1a1a1a);
            --accent: var(--custom-accent, #667eea);
        }

        /* АНИМАЦИИ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        @keyframes slideOut {
            from { transform: translateX(0); }
            to { transform: translateX(-100%); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        #app {
            display: flex;
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--text);
            position: relative;
        }

        /* БОКОВАЯ ПАНЕЛЬ - работает на телефоне */
        #sidebar {
            width: 85%;
            max-width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: -85%;
            top: 0;
            height: 100%;
            z-index: 1000;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 2px 0 20px rgba(0,0,0,0.2);
        }

        #sidebar.open {
            left: 0;
        }

        /* Оверлей для затемнения при открытом меню */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
            backdrop-filter: blur(2px);
        }

        .sidebar-overlay.active {
            display: block;
        }

        #sidebar-header {
            padding: 15px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            flex: 1;
        }

        #user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        #crystals {
            background: gold;
            color: #000;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 22px;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-btn:active {
            transform: scale(0.95);
            background: var(--border);
        }

        #tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.3s;
            font-size: 14px;
        }

        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        #items-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .chat-item {
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-radius: 12px;
            transition: background 0.3s;
            animation: fadeIn 0.5s;
        }

        .chat-item:active {
            background: var(--border);
        }

        .item-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            flex-shrink: 0;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        /* ОСНОВНОЙ ЧАТ */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            width: 100%;
        }

        #chat-header {
            padding: 10px 12px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #menu-btn {
            display: flex;
            background: var(--bg);
        }

        #chat-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            flex-shrink: 0;
        }

        #chat-info {
            flex: 1;
            min-width: 0;
        }

        #chat-name {
            font-weight: 600;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #chat-status {
            font-size: 11px;
            opacity: 0.7;
        }

        .chat-actions {
            display: flex;
            gap: 5px;
            flex-shrink: 0;
        }

        .chat-actions .icon-btn {
            width: 40px;
            height: 40px;
            font-size: 20px;
        }

        #messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 85%;
            margin-bottom: 4px;
            padding: 10px 12px;
            border-radius: 18px;
            animation: fadeIn 0.5s;
            position: relative;
            word-wrap: break-word;
        }

        .message.out {
            background: var(--message-out);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .message.in {
            background: var(--message-in);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        /* Карточка подарка */
        .message.gift-card {
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: white;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 12px;
        }

        .message.gift-card:active {
            transform: scale(0.98);
        }

        .gift-emoji-big {
            font-size: 40px;
            margin-bottom: 5px;
        }

        .gift-timer {
            font-size: 10px;
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            margin-top: 6px;
        }

        /* Кнопка удаления */
        .delete-message-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .message:hover .delete-message-btn,
        .message:active .delete-message-btn {
            opacity: 1;
        }

        .message-deleting {
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.3s;
        }

        .message-time {
            font-size: 9px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        /* Уведомление */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            z-index: 3000;
            font-size: 14px;
            white-space: nowrap;
            max-width: 90%;
            white-space: normal;
            text-align: center;
            animation: fadeInOut 2s ease;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }

        #input-area {
            padding: 10px 12px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        #message-input-wrapper {
            display: flex;
            gap: 8px;
            background: var(--bg);
            border-radius: 25px;
            padding: 4px 12px;
            align-items: center;
        }

        #message-input {
            flex: 1;
            padding: 10px 0;
            border: none;
            background: transparent;
            color: var(--text);
            outline: none;
            font-size: 16px;
        }

        #message-input::placeholder {
            color: var(--text-secondary);
        }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            text-align: center;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
        }

        .modal-btn {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .modal-btn:active {
            transform: scale(0.98);
        }

        .modal-btn.secondary {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        /* МАГАЗИН ПОДАРКОВ */
        .gifts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }

        .gift-item {
            background: var(--bg);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            animation: fadeIn 0.5s;
        }

        .gift-item:active {
            transform: scale(0.96);
        }

        .gift-emoji {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .gift-name {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .gift-price {
            color: gold;
            font-weight: bold;
            font-size: 12px;
        }

        .gift-rarity {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* ЗВОНОК */
        .call-window {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 2500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .call-window.active {
            display: flex;
            animation: fadeIn 0.5s;
        }

        .call-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .call-status {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .call-timer {
            font-size: 32px;
            font-family: monospace;
            margin-bottom: 30px;
        }

        .call-actions {
            display: flex;
            gap: 20px;
        }

        .call-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .call-btn:active {
            transform: scale(0.95);
        }

        .call-btn.end {
            background: #ff4444;
            color: white;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Промокод */
        .promo-input {
            display: flex;
            gap: 8px;
        }

        .promo-input .modal-input {
            flex: 1;
        }

        .promo-input .modal-btn {
            width: auto;
            padding: 12px 20px;
        }

        /* Мобильная оптимизация */
        @media (min-width: 769px) {
            #sidebar {
                position: relative;
                left: 0 !important;
                width: 320px;
            }
            
            #menu-btn {
                display: none !important;
            }
            
            .sidebar-overlay {
                display: none !important;
            }
        }

        @media (max-width: 768px) {
            .message {
                max-width: 85%;
            }
            
            .gifts-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .gift-emoji {
                font-size: 32px;
            }
            
            .modal-content {
                padding: 15px;
            }
            
            .modal-header {
                font-size: 18px;
            }
        }

        @media (max-width: 480px) {
            .gifts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .gift-item {
                padding: 10px;
            }
            
            .gift-emoji {
                font-size: 28px;
            }
            
            .gift-name {
                font-size: 12px;
            }
            
            .chat-actions .icon-btn {
                width: 36px;
                height: 36px;
                font-size: 18px;
            }
            
            #chat-avatar {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
        }

        /* Стили для скролла */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
    </style>
</head>
<body class="theme-light">
    <div id="app">
        <!-- Оверлей для затемнения при открытом меню -->
        <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
        
        <!-- Боковая панель -->
        <div id="sidebar">
            <div id="sidebar-header">
                <div id="user-info" onclick="openProfileModal(); closeSidebar();">
                    <div id="user-avatar">Н</div>
                    <div>
                        <div id="user-name">Загрузка...</div>
                        <div id="crystals">💎 0</div>
                    </div>
                </div>
                <button class="icon-btn" onclick="openSettings(); closeSidebar();">⚙️</button>
            </div>

            <div id="tabs">
                <div class="tab active" onclick="switchTab('chats'); closeSidebar();">Чаты</div>
                <div class="tab" onclick="switchTab('contacts'); closeSidebar();">Контакты</div>
                <div class="tab" onclick="switchTab('shop'); closeSidebar();">Магазин</div>
            </div>
            <div style="padding: 10px;">
                <button class="modal-btn" onclick="findUserByUsername(); closeSidebar();" style="width: 100%;">🔍 Найти пользователя</button>
            </div>

            <div id="items-list"></div>
        </div>

        <!-- Основной чат -->
        <div id="main">
            <div id="chat-header">
                <button class="icon-btn" id="menu-btn" onclick="toggleSidebar()">☰</button>
                <div id="chat-avatar">#</div>
                <div id="chat-info">
                    <div id="chat-name">Нихауу</div>
                    <div id="chat-status"></div>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" onclick="startRealCall(currentChat?.id)">📞</button>
                    <button class="icon-btn" onclick="openGiftSelectionModal()" style="background: linear-gradient(135deg, gold, orange); color: white;">🎁</button>
                </div>
            </div>

            <div id="messages-area">
                <div style="text-align: center; color: var(--text-secondary); margin-top: 50px;">
                    Добро пожаловать в Нихауу!
                </div>
            </div>

            <div id="input-area" style="display: none;">
                <div id="message-input-wrapper">
                    <input type="text" id="message-input" placeholder="Сообщение..." onkeypress="handleKeyPress(event)">
                    <button class="icon-btn" onclick="sendMessage()">📤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Остальные модалки -->
    <div id="call-window" class="call-window">
        <div class="call-avatar">👤</div>
        <div class="call-status">Звонок...</div>
        <div class="call-timer">00:00</div>
        <div class="call-actions">
            <button class="call-btn" onclick="toggleMute()">🎤</button>
            <button class="call-btn end" onclick="endCall()">📞</button>
        </div>
    </div>

    <div id="auth-modal" class="modal active">
        <div class="modal-content">
            <div class="modal-header">🔐 Вход</div>
            <div id="login-form">
                <input type="email" id="login-email" class="modal-input" placeholder="Email" value="test@test.com">
                <input type="password" id="login-password" class="modal-input" placeholder="Пароль" value="123456">
                <button class="modal-btn" onclick="login()">Войти</button>
            </div>
            <div id="register-form" style="display: none;">
                <input type="text" id="register-name" class="modal-input" placeholder="Имя">
                <input type="email" id="register-email" class="modal-input" placeholder="Email">
                <input type="password" id="register-password" class="modal-input" placeholder="Пароль">
                <button class="modal-btn" onclick="register()">Регистрация</button>
            </div>
            <button class="modal-btn secondary" onclick="toggleAuthForm()">Нет аккаунта?</button>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">👤 Профиль</div>
            <div style="text-align: center;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: var(--accent); margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white;">Н</div>
                <button class="modal-btn" style="margin: 10px 0;" onclick="changeAvatar()">📸 Сменить фото</button>
            </div>
            <input type="text" id="profile-name" class="modal-input" placeholder="Имя">
            <input type="text" id="profile-username" class="modal-input" placeholder="@username">
            <textarea id="profile-bio" class="modal-input" placeholder="О себе" rows="3"></textarea>
            
            <div style="margin: 15px 0;">
                <h3>💎 Кристаллы: <span id="profile-crystals">0</span></h3>
                <button class="modal-btn" onclick="openCrystalsShop()">Купить кристаллы</button>
            </div>

            <div id="collection"></div>

            <button class="modal-btn" onclick="saveProfile()">Сохранить</button>
            <button class="modal-btn secondary" onclick="closeModal('profile-modal')">Закрыть</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">⚙️ Настройки</div>
            
            <h3>🎨 Тема</h3>

        // ========== ФУНКЦИИ МЕНЮ ==========
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        // Вспомогательные функции
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }

        function closeModal(id) {
            const m = document.getElementById(id);
            if (m) m.classList.remove('active');
        }

        // Авторизация
        function toggleAuthForm() {
            const login = document.getElementById('login-form');
            const reg = document.getElementById('register-form');
            if (login.style.display !== 'none') {
                login.style.display = 'none';
                reg.style.display = 'block';
            } else {
                login.style.display = 'block';
                reg.style.display = 'none';
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const pwd = document.getElementById('login-password').value;
            try {
                await auth.signInWithEmailAndPassword(email, pwd);
                closeModal('auth-modal');
            } catch (e) { alert('Ошибка: ' + e.message); }
        }

        async function register() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const pwd = document.getElementById('register-password').value;
            if (!name || !email || !pwd) { alert('Заполните все поля'); return; }
            try {
                const user = await auth.createUserWithEmailAndPassword(email, pwd);
                await db.collection('users').doc(user.user.uid).set({
                    name, email, crystals: 500, collection: [], receivedGifts: [], username: '', bio: ''
                });
                closeModal('auth-modal');
            } catch (e) { alert('Ошибка: ' + e.message); }
        }

        // Профиль
        function openProfileModal() {
            const modal = document.getElementById('profile-modal');
            document.getElementById('profile-name').value = userData.name || '';
            document.getElementById('profile-username').value = userData.username || '';
            document.getElementById('profile-bio').value = userData.bio || '';
            document.getElementById('profile-crystals').textContent = userData.crystals || 0;
            
            const collection = document.getElementById('collection');
            const received = userData.receivedGifts || [];
            if (received.length) {
                collection.innerHTML = '<h3>🎁 Полученные подарки</h3>' + 
                    received.map(g => `<div style="display: inline-block; margin: 5px; padding: 8px; background: linear-gradient(135deg, gold, orange); border-radius: 10px; text-align: center;"><div style="font-size: 30px;">${g.emoji}</div><div>${g.name}</div><div style="font-size: 10px;">от ${g.from}</div></div>`).join('');
            } else {
                collection.innerHTML = '<p>Нет подарков</p>';
            }
            modal.classList.add('active');
        }

        async function saveProfile() {
            const name = document.getElementById('profile-name').value;
            const username = document.getElementById('profile-username').value;
            const bio = document.getElementById('profile-bio').value;
            await db.collection('users').doc(currentUser.uid).update({ name, username, bio });
            userData.name = name; userData.username = username; userData.bio = bio;
            document.getElementById('user-name').textContent = name;
            closeModal('profile-modal');
            showToast('✅ Сохранено');
        }

        function changeAvatar() { showToast('📸 Скоро будет'); }

        // Кристаллы
        function openCrystalsShop() {
            closeModal('profile-modal');
            document.getElementById('crystals-shop').classList.add('active');
        }

        function buyCrystals(amount, price) {
            if (confirm(`Купить ${amount} кристаллов за ${price}₽?`)) {
                showToast(`💎 +${amount} кристаллов (тест)`);
                userData.crystals += amount;
                db.collection('users').doc(currentUser.uid).update({ crystals: userData.crystals });
                document.getElementById('crystals').innerHTML = `💎 ${userData.crystals}`;
            }
        }

        function activatePromo() {
            const promo = document.getElementById('promo-code').value;
            if (promo === 'tester26') {
                userData.crystals += 18999;
                db.collection('users').doc(currentUser.uid).update({ crystals: userData.crystals });
                document.getElementById('crystals').innerHTML = `💎 ${userData.crystals}`;
                showToast('✅ +18999 кристаллов');
                closeModal('settings-modal');
            } else { alert('❌ Неверный промокод'); }
        }

        // Магазин подарков
        function openGiftsModal() {
            const list = document.getElementById('gifts-list');
            list.innerHTML = gifts.map(g => `
                <div class="gift-item" onclick="buyGift(${g.id})">
                    <div class="gift-emoji">${g.emoji}</div>
                    <div class="gift-name">${g.name}</div>
                    <div class="gift-price">${g.price} 💎</div>
                    <div class="gift-rarity">${g.rarity}</div>
                </div>
            `).join('');
            document.getElementById('gifts-modal').classList.add('active');
        }

        function buyGift(id) {
            const gift = gifts.find(g => g.id === id);
            if (userData.crystals < gift.price) { alert('❌ Недостаточно кристаллов'); return; }
            userData.crystals -= gift.price;
            if (!userData.collection) userData.collection = [];
            userData.collection.push({...gift, purchasedAt: Date.now()});
            db.collection('users').doc(currentUser.uid).update({ crystals: userData.crystals, collection: userData.collection });
            document.getElementById('crystals').innerHTML = `💎 ${userData.crystals}`;
            showToast(`✅ Куплен ${gift.name}`);
            closeModal('gifts-modal');
            if (confirm('🎁 Подарить другу?')) openGiftSelectionModal();
        }

        // Отправка подарка
        function openGiftSelectionModal() {
            if (!currentChat) { showToast('❌ Выберите чат'); return; }
            const list = document.getElementById('send-gifts-list');
            list.innerHTML = gifts.map(g => `
                <div class="gift-item" onclick="sendGiftToFriend(${g.id})">
                    <div class="gift-emoji">${g.emoji}</div>
                    <div class="gift-name">${g.name}</div>
                    <div class="gift-price">${g.price} 💎</div>
                    <div class="gift-rarity">${g.rarity}</div>
                </div>
            `).join('');
            document.getElementById('send-gift-modal').classList.add('active');
        }

        async function sendGiftToFriend(id) {
            const gift = gifts.find(g => g.id === id);
            if (userData.crystals < gift.price) { alert(`❌ Нужно ${gift.price} 💎`); return; }
            
            userData.crystals -= gift.price;
            await db.collection('users').doc(currentUser.uid).update({ crystals: userData.crystals });
            document.getElementById('crystals').innerHTML = `💎 ${userData.crystals}`;
            
            const parts = currentChat.id.split('_');
            const friendId = parts.find(p => p !== currentUser.uid);
            const friend = await db.collection('users').doc(friendId).get();
            
            await db.collection('messages').add({
                type: 'gift', gift: gift, senderId: currentUser.uid, senderName: userData.name,
                chatId: currentChat.id, timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                redeemUntil: Date.now() + 60000, redeemed: false
            });
            
            showToast(`✅ Подарок отправлен ${friend.data().name}`);
            closeModal('send-gift-modal');
        }

        // Обмен подарка
        async function redeemGift(msgId, gift, sender) {
            const value = Math.floor(gift.price * 0.3);
            if (!confirm(`Обменять ${gift.name} на ${value} 💎?`)) return;
            
            const msgRef = db.collection('messages').doc(msgId);
            const msg = await msgRef.get();
            if (Date.now() > msg.data().redeemUntil) { alert('❌ Время истекло'); return; }
            if (msg.data().redeemed) { alert('❌ Уже обменян'); return; }
            
            userData.crystals += value;
            if (!userData.receivedGifts) userData.receivedGifts = [];
            userData.receivedGifts.push({...gift, from: sender, receivedAt: Date.now()});
            
            await db.collection('users').doc(currentUser.uid).update({
                crystals: userData.crystals, receivedGifts: userData.receivedGifts
            });
            await msgRef.update({ redeemed: true });
            
            document.getElementById('crystals').innerHTML = `💎 ${userData.crystals}`;
            showToast(`✅ +${value} кристаллов`);
        }

        // Удаление сообщения
        async function deleteMessage(msgId, el) {
            if (!confirm('Удалить у всех?')) return;
            if (el) el.classList.add('message-deleting');
            await db.collection('messages').doc(msgId).delete();
            showToast('✅ Удалено');
        }

        // Сообщения
        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentChat) return;
            await db.collection('messages').add({
                text, type: 'text', senderId: currentUser.uid, senderName: userData.name,
                chatId: currentChat.id, timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = '';
        }

        function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

        function loadMessages(chatId) {
            const area = document.getElementById('messages-area');
            db.collection('messages').where('chatId', '==', chatId).orderBy('timestamp', 'asc')
                .onSnapshot(snap => {
                    if (snap.empty) { area.innerHTML = '<div style="text-align: center;">💬 Нет сообщений</div>'; return; }
                    area.innerHTML = '';
                    snap.forEach(doc => {
                        const m = doc.data();
                        const isMine = m.senderId === currentUser?.uid;
                        const div = document.createElement('div');
                        
                        if (m.type === 'gift') {
                            div.className = `message ${isMine ? 'out' : 'in'} gift-card`;
                            const canRedeem = !m.redeemed && !isMine && Date.now() < m.redeemUntil;
                            const left = Math.max(0, Math.floor((m.redeemUntil - Date.now()) / 1000));
                            div.innerHTML = `
                                <div class="gift-emoji-big">${m.gift.emoji}</div>
                                <div><strong>${m.gift.name}</strong></div>
                                <div>💰 ${m.gift.price} 💎</div>
                                <div style="font-size: 11px;">от ${m.senderName}</div>
                                ${canRedeem ? `<div class="gift-timer">⏱️ ${Math.floor(left/60)}:${(left%60).toString().padStart(2,'0')}</div>` : ''}
                                ${m.redeemed ? '<div>✅ Обменян</div>' : ''}
                            `;
                            if (canRedeem) div.onclick = () => redeemGift(doc.id, m.gift, m.senderName);
                        } else {
                            div.className = `message ${isMine ? 'out' : 'in'}`;
                            div.innerHTML = `<div>${m.text}</div><div class="message-time">${m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString().slice(0,5) : ''}</div>`;
                        }
                        
                        if (isMine) {
                            const del = document.createElement('button');
                            del.className = 'delete-message-btn';
                            del.innerHTML = '🗑️';
                            del.onclick = (e) => { e.stopPropagation(); deleteMessage(doc.id, div); };
                            div.appendChild(del);
                        }
                        area.appendChild(div);
                    });
                    area.scrollTop = area.scrollHeight;
                });
        }

        // Контакты
        async function findUserByUsername() {
            const un = prompt('Введите @username:');
            if (!un) return;
            const snap = await db.collection('users').where('username', '==', un).get();
            if (snap.empty) { alert('❌ Не найден'); return; }
            const user = snap.docs[0];
            if (user.id === currentUser.uid) { alert('Это вы'); return; }
            const chatId = currentUser.uid < user.id ? currentUser.uid + '_' + user.id : user.id + '_' + currentUser.uid;
            await db.collection('chats').doc(chatId).set({ participants: [currentUser.uid, user.id], updatedAt: Date.now() }, { merge: true });
            showToast(`✅ Чат с ${user.data().name} создан`);
            loadContacts();
        }

        async function loadContacts() {
            const users = await db.collection('users').get();
            const list = users.docs.filter(d => d.id !== currentUser?.uid).map(d => ({ id: d.id, ...d.data() }));
            const div = document.getElementById('items-list');
            if (!list.length) { div.innerHTML = '<div style="padding: 20px;">Нет контактов</div>'; return; }
            div.innerHTML = list.map(c => `
                <div class="chat-item" onclick="openChatWithContact('${c.id}', '${c.name}')">
                    <div class="item-avatar">${(c.name || '?')[0]}</div>
                    <div><div class="item-name">${c.name}</div><div>@${c.username || 'user'}</div></div>
                </div>
            `).join('');
        }

        async function openChatWithContact(id, name) {
            const chatId = currentUser.uid < id ? currentUser.uid + '_' + id : id + '_' + currentUser.uid;
            currentChat = { id: chatId, name };
            document.getElementById('chat-name').textContent = name;
            document.getElementById('input-area').style.display = 'block';
            loadMessages(chatId);
            // Закрываем меню на телефоне после выбора чата
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        }

        // Звонки
        let localStream, peerConnection;
        async function startRealCall() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('call-window').classList.add('active');
                const localVid = document.createElement('video');
                localVid.srcObject = localStream;
                localVid.autoplay = true;
                localVid.muted = true;
                localVid.style.position = 'absolute';
                localVid.style.bottom = '20px';
                localVid.style.right = '20px';
                localVid.style.width = '100px';
                localVid.style.borderRadius = '10px';
                document.getElementById('call-window').appendChild(localVid);
                callSeconds = 0;
                callTimer = setInterval(() => {
                    callSeconds++;
                    const m = Math.floor(callSeconds/60), s = callSeconds%60;
                    const t = document.querySelector('.call-timer');
                    if (t) t.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            } catch(e) { alert('Ошибка доступа к камере'); }
        }
        function endCall() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (peerConnection) peerConnection.close();
            if (callTimer) clearInterval(callTimer);
            document.getElementById('call-window').classList.remove('active');
        }
        function toggleMute() { showToast('🔇 Микрофон'); }

        // Темы
        function setTheme(t) { document.body.className = `theme-${t}`; closeModal('settings-modal'); }
        function openCustomTheme() { closeModal('settings-modal'); document.getElementById('custom-theme-modal').classList.add('active'); }
        function applyCustomTheme() {
            document.body.style.setProperty('--custom-bg', document.getElementById('custom-bg').value);
            document.body.style.setProperty('--custom-bg-secondary', document.getElementById('custom-bg-secondary').value);
            document.body.style.setProperty('--custom-text', document.getElementById('custom-text').value);
            document.body.style.setProperty('--custom-accent', document.getElementById('custom-accent').value);
            document.body.className = 'theme-custom';
            closeModal('custom-theme-modal');
        }

        // Интерфейс
        function openSettings() { document.getElementById('settings-modal').classList.add('active'); }
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'contacts') loadContacts();
            else if (tab === 'shop') document.getElementById('items-list').innerHTML = `<div style="padding:20px;"><button class="modal-btn" onclick="openGiftsModal()">🎁 Подарки</button><button class="modal-btn" onclick="openCrystalsShop()">💎 Кристаллы</button></div>`;
            else document.getElementById('items-list').innerHTML = '<div style="padding:20px;">Чаты</div>';
        }

        // Авторизация
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                closeModal('auth-modal');
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) {
                    userData = doc.data();
                    document.getElementById('user-name').textContent = userData.name || 'Пользователь';
                    document.getElementById('user-avatar').textContent = (userData.name || 'Н')[0];
                    document.getElementById('crystals').innerHTML = `💎 ${userData.crystals || 0}`;
                } else {
                    await db.collection('users').doc(user.uid).set({ name: 'Пользователь', email: user.email, crystals: 500, collection: [], receivedGifts: [] });
                    userData = { name: 'Пользователь', crystals: 500, collection: [], receivedGifts: [] };
                }
                document.getElementById('input-area').style.display = 'block';
                loadContacts();
            }
        });

        // Закрывать меню при клике вне его (на оверлей)
        document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);
    </script>
</body>
</html>
